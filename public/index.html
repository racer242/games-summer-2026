<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Игра | Добрый Кола</title>
  <meta name="description" content="Описание">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel='preload' as='style' href='https://fonts.googleapis.com/css2?family=Dela+Gothic+One&display=swap'>
  <link href="https://fonts.googleapis.com/css2?family=Dela+Gothic+One&display=swap" rel="stylesheet">

  <link rel='preload' as='style' href='https://fonts.googleapis.com/css2?family=Dela+Gothic+One&display=swap'>
  <link href="https://fonts.googleapis.com/css2?family=Dela+Gothic+One&display=swap" rel="stylesheet">

  <link rel='preload' as='style'
    href='https://fonts.googleapis.com/css2?family=Dela+Gothic+One&family=Onest:wght@100..900&display=swap'>
  <link href="https://fonts.googleapis.com/css2?family=Dela+Gothic+One&family=Onest:wght@100..900&display=swap"
    rel="stylesheet">

  <script src="%PUBLIC_URL%/interface.js"></script>
  <!--
      Notice the use of %PUBLIC_URL% in the tags above.
      It will be replaced with the URL of the `public` folder during the build.
      Only files inside the `public` folder can be referenced from the HTML.

      Unlike "/favicon.ico" or "favicon.ico", "%PUBLIC_URL%/favicon.ico" will
      work correctly both with client-side routing and a non-root public URL.
      Learn how to configure a non-root public URL by running `npm run build`.
    -->
</head>

<body style="background:#000">
  <noscript>You need to enable JavaScript to run this app.</noscript>
  <div id="container" style="position: absolute;left:23px;top:5px;right: 23px; bottom: 5px;">
    <div id="game" class="game" oninit="onAppReadyHandler">
    </div>
  </div>
  <!-- Кнопки для отладки: тест активизации и деактивизации -->
  <button onclick="window.deactivateGameApp();"
    style="position: absolute;top:0px; transform: scale(0.5); z-index: 100;">X</button>
  <button onclick="window.activateGameApp();"
    style="position: absolute;top:15px; transform: scale(0.5);z-index: 100;">></button>
  <button onclick="window.restartGameApp();"
    style="position: absolute;top:30px; transform: scale(0.5);z-index: 100;">R</button>
  <!-- Скрипт для отладки: автозапуск приложения после загрузки -->
  <!-- Для интеграции в другие проекты этот скрипт можно удалить -->
  <script>
    // Автозапуск для отладки
    window.addEventListener('DOMContentLoaded', () => {
      console.log('DataMatrix Scanner: DOMContentLoaded, вызываем activate()');
      // Небольшая задержка для уверенности, что main.jsx загрузился
      setTimeout(() => {
        if (window.activateGameApp) {
          window.activateGameApp();
        }
      }, 100);
    });
  </script>
  <svg>
    <filter id="vertical-blur-10">
      <feGaussianBlur stdDeviation="0 10"></feGaussianBlur>
    </filter>
    <filter id="vertical-blur-5">
      <feGaussianBlur stdDeviation="0 5"></feGaussianBlur>
    </filter>
  </svg>
</body>

</html>
